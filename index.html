<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOP GYM · Панель руководителя</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#000000; --surface:#141218; --surface2:#1A1722;
  --accent:#C6B4F5; --accent-dim:#7d6fae;
  --text:#FFFFFF; --muted:#9A9AA5;
  --green:#5FCF8E; --amber:#E3B341; --red:#E06A6A;
  --head:'Oswald','Bebas Neue','Arial Narrow',sans-serif;
  --body:'Inter','Segoe UI',Arial,sans-serif;
  --radius:16px; --border:1px solid rgba(198,180,245,.22);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased}
header{display:flex;align-items:center;gap:18px;padding:22px 30px;border-bottom:var(--border)}
.logo{font-family:var(--head);font-weight:700;font-size:30px;letter-spacing:2px;text-transform:uppercase}
.logo b{color:var(--accent)}
.sub{color:var(--muted);font-size:13px;letter-spacing:.5px}
nav{display:flex;gap:8px;padding:16px 30px 0;flex-wrap:wrap}
nav button{font-family:var(--head);text-transform:uppercase;letter-spacing:1px;font-size:15px;
  background:var(--surface);color:var(--muted);border:var(--border);border-radius:10px;padding:9px 18px;cursor:pointer;transition:.15s}
nav button:hover{color:var(--text)}
nav button.active{background:var(--accent);color:#0c0a12;font-weight:700;border-color:var(--accent)}
main{padding:24px 30px 60px}
.tab{display:none} .tab.active{display:block}
h2{font-family:var(--head);text-transform:uppercase;letter-spacing:1.5px;font-size:22px;margin:6px 0 18px}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
.two-cards{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.card{background:var(--surface);border:var(--border);border-radius:var(--radius);padding:20px}
.card.bar{border-left:3px solid var(--accent)}
.kpi .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px}
.kpi .val{font-family:var(--head);font-size:46px;color:var(--accent);line-height:1.1;margin-top:6px}
.kpi .note{color:var(--muted);font-size:12px;margin-top:4px}
.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;min-width:560px;border-collapse:collapse}
th,td{text-align:left;padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.07);font-size:14px}
th{color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:11px}
tr.click{cursor:pointer} tr.click:hover{background:var(--surface2)}
.pill{display:inline-block;min-width:42px;text-align:center;padding:3px 10px;border-radius:20px;font-weight:700;font-family:var(--head);font-size:15px;color:#0c0a12}
.rank{font-family:var(--head);font-size:18px;color:var(--accent);width:30px}
.muted{color:var(--muted)} .small{font-size:12px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.radarbox{background:var(--surface);border:var(--border);border-radius:var(--radius);padding:16px}
.radarbox h3{font-family:var(--head);text-transform:uppercase;letter-spacing:1px;font-size:14px;color:var(--accent);margin:0 0 8px}
.radarwrap{position:relative;height:280px}
.hint{color:var(--muted);font-size:13px;margin:0 0 16px}
.detail{background:var(--surface2);border-left:2px solid var(--accent);border-radius:8px;padding:14px 16px;margin:2px 0 6px;white-space:pre-wrap;font-size:13px;line-height:1.5}
.typegrid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
.type .n{font-family:var(--head);font-size:40px;color:var(--accent)}
.type .t{text-transform:uppercase;letter-spacing:1px;font-size:12px;color:var(--muted)}
.ai{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.ai .card{min-height:120px}
.ai h3{font-family:var(--head);text-transform:uppercase;letter-spacing:1px;font-size:16px;margin:0 0 10px}
.mgrcards{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-top:18px}
.mgrcard .nm{font-family:var(--head);font-size:18px;text-transform:uppercase;letter-spacing:1px}
.tag{display:inline-block;background:var(--surface2);border:1px solid rgba(198,180,245,.25);color:var(--accent);border-radius:6px;padding:2px 7px;font-size:11px;margin:3px 3px 0 0}
.flag{display:inline-block;background:rgba(227,179,65,.12);border:1px solid rgba(227,179,65,.4);color:var(--amber);border-radius:6px;padding:2px 7px;font-size:11px;margin:4px 4px 0 0;cursor:help}
.legend{color:var(--muted);font-size:12px;margin-top:14px;line-height:1.6}
.legend b{color:var(--amber)}
@media(max-width:600px){
  header{padding:16px 16px;flex-wrap:wrap;gap:6px}
  .logo{font-size:24px}
  .sub{font-size:12px}
  nav{padding:12px 14px 0}
  nav button{font-size:13px;padding:7px 12px}
  main{padding:16px 14px 44px}
  h2{font-size:19px}
  .card{padding:16px}
  .kpi .val{font-size:34px}
  /* колонки — явно, чтобы 1fr-треки ужимались под экран, а не переполняли */
  .kpis,.two-cards,.typegrid,.ai,.mgrcards{grid-template-columns:repeat(2,1fr)}
  .two{grid-template-columns:1fr}
  .radarwrap{height:260px}
}
@media(max-width:430px){
  .kpis,.two-cards,.typegrid,.ai,.mgrcards{grid-template-columns:1fr}
}
</style>
</head>

  h+=`<div class="grid two-cards" style="margin-top:16px">
    <div class="card"><div class="label muted small">САМОЕ СЛАБОЕ · ВХОДЯЩИЕ</div>
      <div style="font-family:var(--head);font-size:28px;color:var(--accent);margin-top:6px">${esc(nm(OTD.слабейший_входящий[0]))} · ${OTD.слабейший_входящий[1]}</div></div>
    <div class="card"><div class="label muted small">САМОЕ СЛАБОЕ · ИСХОДЯЩИЕ</div>
      <div style="font-family:var(--head);font-size:28px;color:var(--accent);margin-top:6px">${esc(nm(OTD.слабейший_исходящий[0]))} · ${OTD.слабейший_исходящий[1]}</div></div>
  </div>
  <div class="card" style="margin-top:16px"><div class="label muted small">ВОЗРАЖЕНИЯ · ПАРТНЁРСТВО</div>
   <div style="margin-top:8px">Входящих с возражением: <b>${OTD.возражения["входящих_с_возражением"]}</b>, средняя отработка <b style="color:var(--amber)">${OTD.возражения["средняя_отработка"]}</b> &nbsp;·&nbsp;
   Партнёрских обращений: <b>${OTD.партнёрство.обращений}</b> — передано нужному человеку ${OTD.партнёрство["передано_корректно"]}, требуют внимания ${OTD.партнёрство["требуют_внимания"]}</div></div>`;
  document.getElementById("tab-обзор").innerHTML=h;
})();

/* --- Рейтинг --- */
(function(){
  let h='<h2>Рейтинг менеджеров</h2><p class="hint">Клик по менеджеру — профиль по критериям (входящие / исходящие). Динамика — изменение рейтинга к прошлой неделе.</p>';
  h+='<div class="card"><div class="scroll"><table><thead><tr><th>#</th><th>Менеджер</th><th>Итог</th><th>Входящие / Исходящие / Партнёрство</th><th>Динамика</th></tr></thead><tbody>';
  OTD.рейтинг.forEach(([nmv,b],i)=>{
    const ch=MGR[nmv].чатов;
    h+=`<tr class="click" onclick="showRadar('${nmv}')"><td class="rank">${i+1}</td><td><b>${nmv}</b></td>
      <td><span class="pill" style="background:${colorFor(b)}">${b}</span></td>
      <td class="muted">${ch.входящие} / ${ch.исходящие} / ${ch.партнёрство}</td><td>${динHtml(MGR[nmv])}</td></tr>`;
  });
  h+='</tbody></table></div></div><div id="radararea" style="margin-top:18px"></div>';
  document.getElementById("tab-рейтинг").innerHTML=h;
})();

let RADAR_INIT=false, charts={};
function ensureRadar(){ if(!RADAR_INIT){ RADAR_INIT=true; showRadar(OTD.рейтинг[0][0]); } }
function radarData(prof,ord){ const labels=ord.filter(k=>k in prof); return {labels:labels.map(nm), values:labels.map(k=>prof[k])}; }
function makeRadar(canvasId,title,prof,ord){
  const {labels,values}=radarData(prof,ord);
  const ctx=document.getElementById(canvasId);
  if(charts[canvasId]) charts[canvasId].destroy();
  charts[canvasId]=new Chart(ctx,{type:'radar',data:{labels,datasets:[{label:title,
    data:values, fill:true, backgroundColor:'rgba(198,180,245,.25)', borderColor:'#C6B4F5',
    pointBackgroundColor:'#C6B4F5', borderWidth:2, pointRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{r:{min:0,max:10,ticks:{stepSize:2,color:'#9A9AA5',backdropColor:'transparent',font:{size:9}},
        grid:{color:'rgba(255,255,255,.12)'},angleLines:{color:'rgba(255,255,255,.12)'},
        pointLabels:{color:'#FFF',font:{size:9}}}},
      plugins:{legend:{display:false}}}});
}
function showRadar(nmv){
  const m=MGR[nmv];
  const пустоИсх=Object.values(m.профиль_исходящих).every(v=>v==null);
  document.getElementById("radararea").innerHTML=`<div class="two">
    <div class="radarbox"><h3>${nmv} · входящие</h3><div class="radarwrap"><canvas id="rin"></canvas></div></div>
    <div class="radarbox"><h3>${nmv} · исходящие</h3>${пустоИсх?'<div class="radarwrap"><p class="hint">нет исходящих чатов</p></div>':'<div class="radarwrap"><canvas id="rout"></canvas></div>'}</div></div>`;
  makeRadar("rin",nmv,m.профиль_входящих,ВХОД_ОРД);
  if(!пустоИсх) makeRadar("rout",nmv,m.профиль_исходящих,ИСХ_ОРД);
}

/* --- По типам --- */
(function(){
  const типы={}; CH.forEach(c=>{ (типы[c.тип]=типы[c.тип]||[]).push(c.итог); });
  const поряд=["новый","продление","сервис","исходящий","партнёрство"];
  let h='<h2>По типам чатов</h2><div class="grid typegrid">';
  поряд.forEach(t=>{ const a=типы[t]||[]; const avg=a.length?(a.reduce((x,y)=>x+y,0)/a.length).toFixed(1):"—";
    h+=`<div class="card type"><div class="n">${a.length}</div><div class="t">${t}</div>
      <div style="margin-top:8px">ср. итог <b style="color:${colorFor(a.length?+avg:null)}">${avg}</b></div></div>`; });
  h+='</div>';
  document.getElementById("tab-типы").innerHTML=h;
})();

/* --- Разбор чатов --- */
(function(){
  let h='<h2>Разбор по каждому чату</h2><p class="hint">Клик по строке — раскрыть текст чата (из корпуса по ID).</p>';
  h+='<div class="card"><div class="scroll"><table><thead><tr><th>ID</th><th>Менеджер</th><th>Тип</th><th>Итог</th><th>Главная ошибка</th></tr></thead><tbody>';
  CH.forEach((c,i)=>{
    h+=`<tr class="click" onclick="toggle(${i})"><td><b>${esc(c.чат)}</b></td><td>${esc(c.менеджер)}</td>
      <td class="muted">${esc(c.тип)}</td><td><span class="pill" style="background:${colorFor(c.итог)}">${c.итог}</span></td>
      <td class="small">${esc(c.главная_ошибка)}</td></tr>
      <tr id="d${i}" style="display:none"><td colspan="5"><div class="detail"><b>Текст чата:</b>\n${esc(c.текст)}\n\n<b>Совет:</b> ${esc(c.совет)}${c.кап?"\n<b>Ограничение балла:</b> "+esc(c.кап):""}</div></td></tr>`;
  });
  h+='</tbody></table></div></div>';
  document.getElementById("tab-чаты").innerHTML=h;
})();
function toggle(i){ const r=document.getElementById("d"+i); r.style.display = r.style.display==="none"?"table-row":"none"; }

/* --- Панель руководителя (из чисел сводки) --- */
(function(){
  const главное=`Слабее всего отдел держит ВОЗВРАТЫ: «${nm(OTD.слабейший_входящий[0])}» во входящих — ${OTD.слабейший_входящий[1]}, «${nm(OTD.слабейший_исходящий[0])}» в исходящих — ${OTD.слабейший_исходящий[1]}. Тёплые и холодные лиды теряются без второго касания.`;
  const внимание=`Работа с возражениями — ${OTD.возражения["средняя_отработка"]}/10 (${OTD.возражения["входящих_с_возражением"]} чатов), около половины силы. Партнёрство: ${OTD.партнёрство["требуют_внимания"]} из ${OTD.партнёрство.обращений} обращений не переданы нужному человеку.`;
  const хорошо=`Лидер дня — ${OTD.лучший_менеджер[0]} (${OTD.лучший_менеджер[1]}). Отдел силён в скорости ответа и тоне общения: клиент получает быстрый и тёплый контакт на входе.`;
  let h='<h2>Панель руководителя</h2><div class="grid ai">';
  h+=`<div class="card" style="border-left:3px solid var(--red)"><h3>🔴 Главная проблема</h3><div class="small">${esc(главное)}</div></div>`;
  h+=`<div class="card" style="border-left:3px solid var(--amber)"><h3>🟠 Зона внимания</h3><div class="small">${esc(внимание)}</div></div>`;
  h+=`<div class="card" style="border-left:3px solid var(--green)"><h3>✅ Что хорошо</h3><div class="small">${esc(хорошо)}</div></div>`;
  h+='</div><div class="grid mgrcards">';
  OTD.рейтинг.forEach(([nmv,b])=>{
    const m=MGR[nmv];
    const слаб=[...m.слабые_входящие, ...m.слабые_исходящие];
    h+=`<div class="card mgrcard"><div class="nm">${nmv}</div>
      <div><span class="pill" style="background:${colorFor(b)};margin:6px 0">${b}</span></div>
      <div class="small muted">слабые места: ${слаб.length?[...new Set(слаб)].map(s=>`<span class="tag">${esc(nm(s))}</span>`).join(""):"—"}</div>
      <div>${(m.флаги||[]).map(flagHtml).join("")}</div></div>`;
  });
  h+='</div>';
  h+=`<div class="legend"><b>Флаги:</b> Брошен — клиент остался без ответа / менеджер прервал диалог · Короткий — очень короткий диалог (2–3 реплики) · Многодневный — переписка тянулась несколько дней. <span class="muted">(наведите на флаг для подсказки)</span></div>`;
  document.getElementById("tab-панель").innerHTML=h;
})();
</script>
</body>
</html>
